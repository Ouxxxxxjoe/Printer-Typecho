name: Release Plugin

# 手动触发：在 Actions 页面点 Run workflow，输入插件版本号（如 1.0.1）
# 仅打包插件 Printerllm-{ver}.zip，tag 加 printerllm- 前缀（如 printerllm-1.0.1）
# 与主题发版完全解耦——主题更新不会触发插件发版，避免误导用户
#
# 发版前请同步修改 Printerllm/Plugin.php 的 @version 注释，保证三处版本号一致：
#   1. Plugin.php 内 @version
#   2. 此处输入的 version
#   3. 产出的 tag（printerllm-{version}）与 zip 文件名（Printerllm-{version}.zip）
on:
  workflow_dispatch:
    inputs:
      version:
        description: 插件版本号（如 1.0.1，tag 会自动加 printerllm- 前缀）
        required: true
        default: '1.0.1'
      prerelease:
        description: 是否为预发布版本
        type: boolean
        required: false
        default: false

permissions:
  contents: write  # 创建 tag 和 release 需要

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 校验版本号格式
        id: ver
        run: |
          VER="${{ github.event.inputs.version }}"
          # 仅允许数字和点号，防止注入和怪异文件名（tag 前缀 printerllm- 由 workflow 自动拼接）
          if ! echo "$VER" | grep -Eq '^[0-9]+(\.[0-9]+)*$'; then
            echo "::error::版本号只能包含数字和点号（如 1.0.1、1.1.0），收到：$VER"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=printerllm-$VER" >> "$GITHUB_OUTPUT"
          echo "校验通过：版本号 $VER，tag printerllm-$VER"

      - name: 打包插件 Printerllm-${{ steps.ver.outputs.version }}.zip
        run: |
          test -d Printerllm || { echo "::error::未找到 Printerllm 插件目录"; exit 1; }
          # 与主题打包方式一致：先建 dist/Printerllm/ 中间目录，
          # 确保 zip 内层为 Printerllm/（Typecho 要求 usr/plugins/Printerllm/Plugin.php）
          mkdir -p dist/Printerllm
          cp -r Printerllm/* dist/Printerllm/ 2>/dev/null || true
          # 校验插件核心文件齐全
          test -f dist/Printerllm/Plugin.php || { echo "::error::缺少 Plugin.php，插件打包失败"; exit 1; }
          cd dist && zip -r "Printerllm-${{ steps.ver.outputs.version }}.zip" Printerllm -x '*.DS_Store'
          echo "插件包内容："
          unzip -l "Printerllm-${{ steps.ver.outputs.version }}.zip"

      - name: 创建 tag 与 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true  # 自动从 commits 生成变更说明
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            dist/Printerllm-${{ steps.ver.outputs.version }}.zip
